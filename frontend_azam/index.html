<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Examination Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-shell">
    <div class="auth-side">
      <div class="auth-side__mark">◆</div>
      <h1 class="auth-side__title">Examination<br/>Ledger</h1>
      <p class="auth-side__tag">Courses, timetables, venues, and results — kept in one register.</p>
      <div class="ticket">
        <div class="ticket__row"><span>Admission</span><strong>All roles</strong></div>
        <div class="ticket__row"><span>Access</span><strong>JWT secured</strong></div>
        <div class="ticket__perf"></div>
        <div class="ticket__row ticket__row--stub"><span>Sign in below</span><strong>→</strong></div>
      </div>
    </div>

    <div class="auth-form-wrap">
      <form id="login-form" class="auth-form" novalidate>
        <h2>Sign in</h2>
        <p class="muted" id="login-hint">Use your registered email and password.</p>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn--primary btn--block" id="login-btn">Sign in</button>
        <p class="switch-link">New here? <a href="register.html">Create an account</a></p>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
