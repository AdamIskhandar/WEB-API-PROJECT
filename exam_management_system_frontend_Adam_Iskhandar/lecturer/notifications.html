<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="assets/lecturer.css">
</head>
<body data-page="notifications">
<div class="layout">
<nav class="navbar" id="navbar">
    <a class="brand" href="index.html"><div class="logo">L</div><span class="brand-text">Lecturer Workspace</span></a>
    <div class="nav">
        <a href="index.html" data-nav="dashboard">Overview</a>
        <a href="courses.html" data-nav="courses">Courses</a>
        <a href="exams.html" data-nav="exams">Exam Schedule</a>
        <a href="results.html" data-nav="results">Results</a>
        <a href="notifications.html" data-nav="notifications">Notifications</a>
    </div>
    <div class="nav-right">
        <span class="user-chip" id="userChip">Loading...</span>
        <button class="btn secondary small" onclick="logout()">Logout</button>
        <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
    </div>
</nav>
<main class="main">
    <div id="alert" class="alert"></div>
    <section class="topbar">
    <div><div class="eyebrow">Exam Management System</div><h2>Notifications</h2><p>Send announcements to students.</p></div>
    <div class="actions"><button class="btn secondary" onclick="refreshPage()">Refresh</button></div>
</section>
<div class="filter-bar" id="notificationFilter">
    <h4>Filter Notifications</h4>
    <div class="filter-row">
        <div class="filter-field"><label>User ID</label><input data-filter="user_id" type="number" placeholder="e.g. 4"></div>
        <div class="filter-field"><label>Title</label><input data-filter="title" placeholder="Search title..."></div>
        <div class="filter-field"><label>Read Status</label>
            <select data-filter="is_read">
                <option value="">All</option>
                <option value="0">Unread</option>
                <option value="1">Read</option>
            </select>
        </div>
        <div class="filter-actions"><button class="btn outline small" data-clear-filter>Clear</button></div>
    </div>
</div>
<section class="grid two-col section">
    <div class="card">
        <div class="section-head"><div><h3>Send Notification</h3><p>Create a notification for a user.</p></div></div>
        <form id="notificationForm" class="form-grid">
            <label>User ID<input name="user_id" type="number" required></label>
            <label>Title<input name="title" required></label>
            <label class="full">Message<textarea name="message" required></textarea></label>
            <label>Read Status<select name="is_read"><option value="0" selected>Unread</option><option value="1">Read</option></select></label>
            <button class="btn full" type="submit">Send Notification</button>
        </form>
    </div>
    <div class="card"><div class="section-head"><div><h3>Notifications</h3><p>Records returned by the API.</p></div></div><div id="notificationTable"></div></div>
</section>
</main>
</div>
<script src="assets/lecturer.js"></script>
</body>
</html>
