<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body data-page="users">
<div class="layout">
<nav class="navbar" id="navbar">
    <a class="brand" href="index.html"><div class="logo">A</div><span class="brand-text">Admin Control</span></a>
    <div class="nav">
        <a href="index.html" data-nav="dashboard">Overview</a>
        <a href="users.html" data-nav="users">Users</a>
        <a href="courses.html" data-nav="courses">Courses</a>
        <a href="venues.html" data-nav="venues">Venues</a>
        <a href="exams.html" data-nav="exams">Exam Schedules</a>
        <a href="registrations.html" data-nav="registrations">Registrations</a>
        <a href="results.html" data-nav="results">Results</a>
        <a href="notifications.html" data-nav="notifications">Notifications</a>
    </div>
    <div class="nav-right">
        <span class="user-chip" id="userChip">Loading...</span>
        <button class="btn secondary small" onclick="logout()">Logout</button>
        <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
    </div>
</nav>
<main class="main">
    <div id="alert" class="alert"></div>
    <section class="topbar">
    <div><div class="eyebrow">Exam Scheduling &amp; Result Management</div><h2>Users</h2><p>Manage role-based user accounts.</p></div>
    <div class="actions"><button class="btn secondary" onclick="refreshPage()">Refresh</button></div>
</section>
<div class="filter-bar" id="userFilter">
    <h4>Filter Users</h4>
    <div class="filter-row">
        <div class="filter-field"><label>User ID</label><input data-filter="user_id" type="number" placeholder="e.g. 5"></div>
        <div class="filter-field"><label>Name</label><input data-filter="name" placeholder="Search name..."></div>
        <div class="filter-field"><label>Role</label>
            <select data-filter="role">
                <option value="">All Roles</option>
                <option value="student">Student</option>
                <option value="lecturer">Lecturer</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <div class="filter-field"><label>Faculty ID</label><input data-filter="faculty_id" type="number" placeholder="e.g. 2"></div>
        <div class="filter-actions"><button class="btn outline small" data-clear-filter>Clear</button></div>
    </div>
</div>
<section class="grid two-col section">
    <div class="card">
        <div class="section-head"><div><h3>Create User</h3><p>Add student, lecturer, or admin accounts.</p></div></div>
        <form id="userForm" class="form-grid">
            <label>Name<input name="name" required></label>
            <label>Email<input name="email" type="email" required></label>
            <label>Password<input name="password" type="password" required></label>
            <label>Role<select name="role"><option value="student">Student</option><option value="lecturer">Lecturer</option><option value="admin">Admin</option></select></label>
            <label class="full">Faculty ID<input name="faculty_id" type="number" placeholder="Optional"></label>
            <button class="btn full" type="submit">Create User</button>
        </form>
    </div>
    <div class="card"><div class="section-head"><div><h3>User Records</h3><p>Existing system accounts.</p></div></div><div id="userTable"></div></div>
</section>
</main>
</div>
<script src="assets/admin.js"></script>
</body>
</html>
