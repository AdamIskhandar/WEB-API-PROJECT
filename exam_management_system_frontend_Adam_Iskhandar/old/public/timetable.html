<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Timetable</title>
    <link rel="stylesheet" href="assets/student.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand"><div class="logo">S</div><h1>Student<br>Portal</h1></div>
            <nav class="nav">
                <a href="student.html">Overview</a>
                <a href="timetable.html">Timetable</a>
                <a href="results.html">Results</a>
                <a href="registrations.html">Registrations</a>
                <a href="notifications.html">Notifications</a>
            </nav>
            <div class="user-mini" id="userMini">Loading user...</div>
        </aside>

        <main class="main">
            <div id="alert" class="alert"></div>
            <section class="topbar">
                <div>
                    <div class="eyebrow">Student</div>
                    <h2>My Exam Timetable</h2>
                    <p>View your examination schedule, date, time, and venue.</p>
                </div>
                <div class="actions">
                    <button class="btn secondary" onclick="loadAll()">Refresh</button>
                    <button class="btn danger" onclick="logout()">Logout</button>
                </div>
            </section>

            <section class="card section">
                <div class="section-head">
                    <div>
                        <h3>Examination Schedule</h3>
                        <p>Exams are filtered by your registered courses when registration data is available.</p>
                    </div>
                    <span class="pill">Timetable</span>
                </div>
                <div id="examTable"></div>
            </section>
        </main>
    </div>
    <script src="assets/student.js"></script>
</body>
</html>
